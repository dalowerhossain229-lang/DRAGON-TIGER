<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAGON TIGER - ROYAL SHOWDOWN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল (ব্যালেন্স বক্স সহ ১ শতভাগ ডাইস-৩ডি স্ট্যান্ডার্ডে নিখুঁত লক ভাই ভাই) -->
    <div class="header">
        <div class="brand">
            <div class="name">DRAGON TIGER</div>
            <div class="game">ROYAL TABLE SHOWDOWN</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🎰 লাইভ ড্রাগন টাইগার ডিলিং টেবিল বোর্ড এরিয়া ভাই ভাই -->
    <div class="baccarat-table-zone">
        <!-- ড্রাগন সাইড কার্ড উইন্ডো -->
        <div class="table-side-box player-glow">
            <div class="side-title title-player">DRAGON (ড্রাগন) 🐉</div>
            <div class="score-badge" id="dragon-score-badge">VALUE: 0</div>
            <div class="cards-hand-display" id="dragon-card-container">
                <div class="card-back-default">🐉</div>
            </div>
        </div>

        <!-- টাইটেল মেগা ভার্সাস জোন -->
        <div style="display:flex; align-items:center; justify-content:center; font-weight:900; color:#f1c40f; font-size:20px; text-shadow:0 0 10px #f1c40f;">VS</div>

        <!-- টাইগার সাইড কার্ড উইন্ডো -->
        <div class="table-side-box banker-glow">
            <div class="side-title title-banker">TIGER (টাইগার) 🐅</div>
            <div class="score-badge" id="tiger-score-badge">VALUE: 0</div>
            <div class="cards-hand-display" id="tiger-card-container">
                <div class="card-back-default">🐅</div>
            </div>
        </div>
    </div>

    <!-- 🎯 বাজি ধরার প্রধান ৩টি প্রফেশনাল বেটিং বোর্ড ঘর (১.৯৫ ও ৮.০০ ওডস কড়া লক ভাই ভাই) -->
    <div class="betting-board">
        <button class="bet-board-btn side-player-btn" id="board-DRAGON" onclick="selectDragonTigerSide('DRAGON')">
            <span class="board-label">DRAGON 🐉</span>
            <span class="board-odds">x1.95</span>
        </button>
        <button class="bet-board-btn side-tie-btn" id="board-TIE" onclick="selectDragonTigerSide('TIE')">
            <span class="board-label">TIE 🤝</span>
            <span class="board-odds">x8.00</span>
        </button>
        <button class="bet-board-btn side-banker-btn" id="board-TIGER" onclick="selectDragonTigerSide('TIGER')">
            <span class="board-label">TIGER 🐅</span>
            <span class="board-odds">x1.95</span>
        </button>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং ও উইন-লস মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">টার্গেট সিলেক্ট করে DEAL বোতাম চাপুন ভাই ভাই!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০0 প্লাস-মাইনাস ও DEAL বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleDragonTigerDealAction()">DEAL</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let selectedSide = null; 
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // 🚀 [মেগা ডাইনামিক ইমেজ পাথ ফিল্টার]: ছোট-বড় অক্ষর ও পূর্ণ নামের তাস এক শটে কনভার্ট ভাই ভাই!
        function getCardHtmlString(cardObj) {
            if (!cardObj) return "";
            const val = cardObj.value;
            const suitLetter = cardObj.suit ? cardObj.suit.toUpperCase() : "S";
            const suitFullNames = { "S": "spades", "H": "hearts", "D": "diamonds", "C": "clubs" };
            const suitFull = suitFullNames[suitLetter] || "spades";

            return `<img src="./cards/${val}_of_${suitLetter}.png" class="card-img-node" alt="card" onerror="this.onerror=null; this.src='./cards/${val}_of_${suitFull}.png'; this.onerror=function(){ this.src='./cards/${val}_of_${suitLetter}.PNG'; this.onerror=function(){ this.src='./cards/${val}_of_${suitFull}.PNG'; } };">`;
        }

        // 🧠 [১ শতভাগ একুরেট ড্রাগন টাইগার ডিলিং এনিমেশন ইঞ্জিন ভাই ভাই]
        function animateDragonTigerDealing(serverData) {
            const dZone = document.getElementById("dragon-card-container");
            const tZone = document.getElementById("tiger-card-container");
            const dScoreBadge = document.getElementById("dragon-score-badge");
            const tScoreBadge = document.getElementById("tiger-score-badge");

            dZone.innerHTML = "";
            tZone.innerHTML = "";
            dScoreBadge.innerText = "VALUE: 0";
            tScoreBadge.innerText = "VALUE: 0";

            // ১. ড্রাগন তাস প্লে ফিল্ডে ফায়ার ভাই ভাই
            setTimeout(() => {
                playAudio('click');
                const dCardDiv = document.createElement("div");
                dCardDiv.className = "card-baccarat-animation-node";
                dCardDiv.innerHTML = getCardHtmlString(serverData.dragonCard);
                dZone.appendChild(dCardDiv);
                dScoreBadge.innerText = `VALUE: ${serverData.dragonCard.value}`;
            }, 300);

            // ২. টাইগার তাস প্লে ফিল্ডে ফায়ার ভাই ভাই
            setTimeout(() => {
                playAudio('click');
                const tCardDiv = document.createElement("div");
                tCardDiv.className = "card-baccarat-animation-node";
                tCardDiv.innerHTML = getCardHtmlString(serverData.tigerCard);
                tZone.appendChild(tCardDiv);
                tScoreBadge.innerText = `VALUE: ${serverData.tigerCard.value}`;
                
                // সমাপনী ফলাফল আউটপুট জোন ভাই ভাই
                showFinalGameReward(serverData.status, serverData.winAmount, serverData.result);
            }, 800);
        }

        // 🛫 কোর DEAL বোতাম ট্রিগার অ্যাকশন গেটওয়ে ভাই ভাই
        async function handleDragonTigerDealAction() {
            if (isSpinning) return;
            if (!selectedSide) {
                alert("🚨 আগে বাজি ধরার যেকোনো ১টি ঘর (DRAGON, TIGER বা TIE) সিলেক্ট করুন ভাই!");
                isAuto = false;
                document.getElementById("auto-btn").classList.remove("active");
                return;
            }

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🃏 ডিলার কার্ড ডিলিং করছে সচল মোডে...";

            playAudio('spin');

            try {
                const response = await fetch(`${SERVER_URL}/api/dragon-deal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        prediction: selectedSide
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    animateDragonTigerDealing(data);
                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopDragonState();
                }
            } catch (err) {
                alert("⚠️ সেশন আউট! আবার DEAL বোতাম চাপুন ভাই ভাই।");
                stopDragonState();
            }
        }

                function showFinalGameReward(status, winAmount, winnerSide) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (status === "win") {
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! রাউন্ডে জিতেছে: ${winnerSide} [৳${winAmount}]`;
            } else {
                playAudio('wheel'); 
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ রাউন্ডে জিতেছে: ${winnerSide}। এই রাউন্ডে ভাগ্য সহায় হয়নি ভাই!`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopDragonState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleDragonTigerDealAction();
                }, 3000); 
            }
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/dragon-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance fetch latency check"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        };

        function selectDragonTigerSide(side) {
            if (isSpinning) return;
            selectedSide = side;
            document.querySelectorAll(".bet-board-btn").forEach(b => b.classList.remove("active-side-bet"));
            document.getElementById(`board-${side}`).classList.add("active-side-bet");
            playAudio('click');
        }

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else if (currentBet <= 1000) currentBet -= 100;
                else currentBet -= 500;
            }
            if (action === 'plus' && currentBet < 20000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else if (currentBet < 1000) currentBet += 100;
                else currentBet += 500;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 20000) currentBet = 20000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
            slotSounds.click.muted = isMuted;
            slotSounds.spin.muted = isMuted;
            slotSounds.win.muted = isMuted;
            slotSounds.wheel.muted = isMuted;
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleDragonTigerDealAction();
            playAudio('click');
        }

        function stopDragonState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৪টি ওরিজিনাল প্রিমিয়াম ক্যাসিনো সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            wheel: new Audio('wheel1.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
