<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAGON TIGER - ROYAL CASINO ARENA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার ব্লকার (ডাবল ব্যালেন্স বক্স জ্যাম এড়াতে style.css দিয়ে হাইড লক করা ভাই ভাই) -->
    <div class="header">
        <div class="brand">
            <div class="class-name">DRAGON TIGER</div>
            <div class="class-game">ROYAL CASINO ARENA</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()"></button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🃏 ড্রাগন ও টাইগার লাইভ কার্ড শোডাউন টেবিল বোর্ড -->
    <div class="board-dealing-zone">
        <!-- ড্রাগন (DRAGON) বক্স জোন -->
        <div class="board-column dragon-bg-glow">
            <div class="column-header-title header-dragon">DRAGON (ড্রাগন) <span id="dragon-score" class="score-badge">0</span></div>
            <div class="cards-display-grid" id="dragon-cards-container"></div>
        </div>

        <!-- টাইগার (TIGER) বক্স জোন -->
        <div class="board-column tiger-bg-glow">
            <div class="column-header-title header-tiger">TIGER (টাইগার) <span id="tiger-score" class="score-badge">0</span></div>
            <div class="cards-display-grid" id="tiger-cards-container"></div>
        </div>
    </div>

    <!-- 💸 বাজি ধরার প্রধান ৩টি নিয়ন বেটিং স্পট (DRAGON, TIE, TIGER ওডস লক ভাই) -->
    <div class="betting-board">
        <button class="bet-board-btn dragon-select-btn" id="board-DRAGON" onclick="selectBetSide('DRAGON')">
            <span class="board-label">DRAGON</span>
            <span class="board-odds">x2.0</span>
        </button>

        <button class="bet-board-btn tie-select-btn" id="board-TIE" onclick="selectBetSide('TIE')">
            <span class="board-label">TIE</span>
            <span class="board-odds">x9.0</span>
        </button>

        <button class="bet-board-btn tiger-select-btn" id="board-TIGER" onclick="selectBetSide('TIGER')">
            <span class="board-label">TIGER</span>
            <span class="board-odds">x2.0</span>
        </button>
    </div>

    <!-- 📢 উইন-লস লাইভ ক্যাসিনো মেসেজ প্যানেল বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">DRAGON, TIGER বা TIE সিলেক্ট করে DEAL বোতাম চাপুন ওস্তাদ!</span>
    </div>

    <!-- 🎛️ নিচের মেইন কন্ট্রোল প্যানেল ফুটার -->
    <div class="footer-controls">
        <div class="play-section">
            <button class="bet-btn-nav" onclick="adjustBet('minus')">-</button>
            <div style="text-align: center; width: 60px;">
                <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳50</div>
            </div>
            <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>

            <button class="play-btn" id="spin-btn" onclick="handleDragonTigerDeal()">DEAL</button>
            
            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()"></button>
            </div>
        </div>
    </div>

    <!-- 🔌 [ইন্টারন্যাশনাল সকেট ইঞ্জিন লাইব্রেরি গেটওয়ে] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";

        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50;
        let selectedSide = null;
        let isSpinning = false;
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 50) currentBet -= 50;
            if (action === 'plus' && currentBet < 20000) currentBet += 50;
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function selectBetSide(side) {
            if (isSpinning) return;
            selectedSide = side;
            document.getElementById("board-DRAGON").classList.remove("active-side-bet");
            document.getElementById("board-TIE").classList.remove("active-side-bet");
            document.getElementById("board-TIGER").classList.remove("active-side-bet");
            document.getElementById(`board-${side}`).classList.add("active-side-bet");
            playAudio('click');
        }

        // 🎰 [🎰 ৫৪ গেমের সুপ্রিম ওরিজিনাল রুট ইমেজ সিঙ্ক জাভাস্ক্রিপ্ট ইঞ্জিন ভাই ভাই]
        function animateCardDealing(serverData) {
            const dZone = document.getElementById("dragon-cards-container");
            const tZone = document.getElementById("tiger-cards-container");

            dZone.innerHTML = "";
            tZone.innerHTML = "";
            document.getElementById("dragon-score").innerText = "0";
            document.getElementById("tiger-score").innerText = "0";

            const dCard = serverData.dragonCard;
            const tCard = serverData.tigerCard;

            // 🕒 ক্যাসিনো স্টাইল ডিলিং টাইমার স্পিড লুপ ভাই ভাই
            setTimeout(() => {
                // 🐉 ড্রাগন কার্ড সরাসরি গิตহাব রুট ডিরেক্টরি থেকে লোড চেইন
                const cardDivD = document.createElement("div");
                cardDivD.className = "card-deal-animation-node";
                cardDivD.style.width = "70px"; cardDivD.style.height = "100px";
                cardDivD.innerHTML = `<img src="${dCard.value}_of_${dCard.suit.toUpperCase()}.png" style="width:100%;height:100%;object-fit:cover;display:block;" alt="Dragon Card">`;
                dZone.appendChild(cardDivD);
                document.getElementById("dragon-score").innerText = serverData.dragonScore;
                playAudio('spin');
            }, 300);

            setTimeout(() => {
                // 🐯 টাইগার কার্ড সরাসরি গিটহাব রুট ডিরেক্টরি থেকে লোড চেইন
                const cardDivT = document.createElement("div");
                cardDivT.className = "card-deal-animation-node";
                cardDivT.style.width = "70px"; cardDivT.style.height = "100px";
                cardDivT.innerHTML = `<img src="${tCard.value}_of_${tCard.suit.toUpperCase()}.png" style="width:100%;height:100%;object-fit:cover;display:block;" alt="Tiger Card">`;
                tZone.appendChild(cardDivT);
                document.getElementById("tiger-score").innerText = serverData.tigerScore;
                playAudio('spin');
                
                // ফাইনাল রেজাল্ট অ্যানিমেশন শেষে পুরস্কার উইন্ডো ট্রিগার
                showFinalGameReward(serverData.status, serverData.winAmount, serverData.result);
            }, 800);
        }

        async function handleDragonTigerDeal() {
            if (isSpinning) return;
            if (!selectedSide) {
                alert("🔒 বাজি প্লে করার আগে DRAGON, TIGER বা TIE সিলেক্ট করুন ওস্তাদ!");
                return;
            }

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🎰 ড্রাগন টাইগার কার্ড ডিলিং হচ্ছে...";
            playAudio('click');

            try {
                const response = await fetch(`${SERVER_URL}/api/dragontiger-deal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        prediction: selectedSide,
                        game: "dragontiger" // লবির সাথে ১০০% একুরেট শর্টকোড সিঙ্ক
                    })
                });

                const serverRes = await response.json();
                
                if (serverRes.success || serverRes.success === true) {
                    balance = parseFloat(serverRes.balance || serverRes.data?.balance || balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    animateCardDealing(serverRes.gameData);
                } else {
                    alert(serverRes.message || "❌ Insufficient Balance! Please Recharge Wallet.");
                    stopDragonTigerState();
                }
            } catch (err) {
                console.log("Dragon-Tiger Gateway Connection Drop");
                stopDragonTigerState();
            }
        }

        function showFinalGameReward(status, winAmount, winnerSide) {
        const msgBox = document.getElementById("win-status-box");
        const textMsg = document.getElementById("win-text-msg");
        
        if (status === "win") {
            playAudio('win');
            if (msgBox) msgBox.className = "win-status-container win-glow-bar";
            if (textMsg) textMsg.innerHTML = `🎉 গ্র্যান্ড উইন ওস্তাদ! <b>${winnerSide}</b> জিতেছে এবং আপনার ওয়ালেটে ৳${winAmount} ক্রেডিট হয়েছে ভাই ভাই!`;
        } else {
            playAudio('wheel');
            if (msgBox) msgBox.className = "win-status-container lose-glow-bar";
            if (textMsg) textMsg.innerHTML = `💥 ওহ হো! <b>${winnerSide}</b> জিতেছে। এই রাউন্ডে বাজি লস হয়েছে ভাই ভাই!`;
        }

        fetchLiveBalance();
        stopDragonTigerState();

        if (isAuto) {
            autoInterval = setTimeout(() => {
                if (isAuto) handleDragonTigerDeal();
            }, 3000);
        }
    }

    if (typeof io !== 'undefined') {
        const socket = io();
        socket.on("balanceUpdate", (data) => {
            if (data && data.username === urlUserId) {
                if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                fetchLiveBalance();
            }
        });
    }

    async function fetchLiveBalance() {
        try {
            const response = await fetch(`${SERVER_URL}/api/dragontiger-balance?userId=${urlUserId}&wallet=${urlWallet}`);
            const serverData = await response.json();
            if (serverData.success) {
                balance = parseFloat(serverData.balance);
                if (document.getElementById("user-balance")) {
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            }
        } catch (e) { console.error("Balance query fail pass"); }
    }

    window.onload = () => {
        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
        fetchLiveBalance();
    };

    function toggleMute() {
        isMuted = !isMuted;
        const muteEl = document.getElementById("mute-btn");
        if (muteEl) muteEl.innerText = isMuted ? "🔇" : "🔊";
        slotSounds.click.muted = isMuted;
        slotSounds.spin.muted = isMuted;
        slotSounds.win.muted = isMuted;
        slotSounds.wheel.muted = isMuted;
    }

    function toggleAuto() {
        isAuto = !isAuto;
        const autoEl = document.getElementById("auto-btn");
        if (autoEl) autoEl.classList.toggle('active', isAuto);
        if (isAuto && !isSpinning) handleDragonTigerDeal();
        playAudio('click');
    }

    function stopDragonTigerState() {
        isSpinning = false;
        if (document.getElementById("spin-btn")) {
            document.getElementById("spin-btn").disabled = false;
        }
        if (!isAuto && autoInterval) clearTimeout(autoInterval);
    }

    // 🎵 [১০০% ওরিজিনাল প্রিমিয়াম ক্যাসিনো অডিও এবং বাফার প্লেয়ার মডিউল ভাই ভাই]
    const slotSounds = {
        click: new Audio('click2.mp3'),
        spin: new Audio('spin2.mp3'),
        win: new Audio('win2.mp3'),
        wheel: new Audio('wheel1.mp3')
    };
    Object.values(slotSounds).forEach(s => s.load());

    function playAudio(type) {
        if (isMuted) return;
        try {
            slotSounds[type].currentTime = 0;
            slotSounds[type].play();
        } catch(e) {}
    }
</script>
</body>
</html>
