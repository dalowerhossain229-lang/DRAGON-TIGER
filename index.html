<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAGON TIGER - ROYAL CASINO CLUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার ব্লকার (style.css দিয়ে হাইд লক করা ভাই ভাই) -->
    <div class="header">
        <div class="brand">
            <div class="class-name">DRAGON TIGER</div>
            <div class="class-game">ROYAL CASINO CLUB</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()"></button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🃏 ড্রাগন ও টাইগার লাইভ কার্ড শোডাউন টেবিল বোর্ড এরিয়া -->
    <div class="board-dealing-zone">
        <!-- DRAGON (ড্রাগন) BOX জোন -->
        <div class="board-column dragon-bg-glow">
            <div class="column-header-title header-player">DRAGON (ড্রাগন) 🐉</div>
            <div class="cards-display-grid" id="dragon-cards-container"></div>
        </div>

        <!-- TIGER (টাইগার) BOX জোন -->
        <div class="board-column tiger-bg-glow">
            <div class="column-header-title header-banker">TIGER (টাইগার) 🐅</div>
            <div class="cards-display-grid" id="tiger-cards-container"></div>
        </div>
    </div>

    <!-- 💸 বাজি ধরার প্রধান ৩টি নিয়ন মডিউল (DRAGON, TIE, TIGER ওডস লক ভাই) -->
    <div class="betting-board">
        <button class="bet-board-btn dragon-select-btn" id="board-DRAGON" onclick="selectBetSide('DRAGON')">
            <span class="board-label">DRAGON</span>
            <span class="board-odds">x2.0</span>
        </button>

        <button class="bet-board-btn tie-select-btn" id="board-TIE" onclick="selectBetSide('TIE')">
            <span class="board-label">TIE (ড্র)</span>
            <span class="board-odds">x9.0</span>
        </button>

        <button class="bet-board-btn tiger-select-btn" id="board-TIGER" onclick="selectBetSide('TIGER')">
            <span class="board-label">TIGER</span>
            <span class="board-odds">x2.0</span>
        </button>
    </div>

    <!-- 📢 উইন-লস লাইভ ক্যাসিনো মেসেজ প্যানেল বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">DRAGON, TIGER বা TIE সিলেক্ট করে DEAL বোতাম চাপুন ওস্তাদ!</span>
    </div>

    <!-- 🎛— অ্যাকশন কন্ট্রোল বোর্ড প্যানেল ফুটার -->
    <div class="footer-controls">
        <div class="play-section">
            <button class="bet-btn-nav" onclick="adjustBet('minus')">-</button>
            <div style="text-align: center; width: 60px;">
                <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳50</div>
            </div>
            <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>

            <button class="play-btn" id="spin-btn" onclick="handleDragonDeal()">DEAL</button>
            
            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()"></button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইঙ্গো কালার ট্রেড সিঙ্ক - ইন্টারন্যাশনাল সকেট ইঞ্জিন লাইব্রেরি গেটওয়ে] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";

        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50;
        let selectedSide = null;
        let isSpinning = false;
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 50) currentBet -= 50;
            if (action === 'plus' && currentBet < 20000) currentBet += 50;
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function selectBetSide(side) {
            if (isSpinning) return;
            selectedSide = side;
            document.getElementById("board-DRAGON").classList.remove("active-side-bet");
            document.getElementById("board-TIE").classList.remove("active-side-bet");
            document.getElementById("board-TIGER").classList.remove("active-side-bet");
            document.getElementById(`board-${side}`).classList.add("active-side-bet");
            playAudio('click');
        }

        // 🎰 [🎰 ৫৪ গেমের সুপ্রিম ওরিজিনাল রুট ইমেজ সিঙ্ক জাভাস্ক্রিপ্ট অ্যানিমেশন ইঞ্জিন ভাই ভাই]
        function animateCardDealing(serverData) {
            const dZone = document.getElementById("dragon-card-container");
            const tZone = document.getElementById("tiger-card-container");

            const dCard = serverData.dragonCard;
            const tCard = serverData.tigerCard;

            dZone.innerHTML = "";
            tZone.innerHTML = "";

            // 🔵 ১. ড্রাগন কার্ড অ্যানিমেশন লোড চেইন (বড় হাতের কেস-সেন্সিটিভ ও ভাঙা ছবি প্রুফ ফিল্টার)
            setTimeout(() => {
                let dVal = String(dCard.value).toUpperCase();
                let dSuit = String(dCard.suit).toUpperCase();
                const dDiv = document.createElement("div");
                dDiv.className = "card-deal-animation-node";
                dDiv.style.width = "70px"; dDiv.style.height = "100px";
                dDiv.innerHTML = `<img src="${dVal}_of_${dSuit}.png" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.src='card-back.png'">`;
                dZone.appendChild(dDiv);
                playAudio('spin');
            }, 200);

            // 🔴 ২. টাইগার কার্ড অ্যানিমেশন লোড চেইন
            setTimeout(() => {
                let tVal = String(tCard.value).toUpperCase();
                let tSuit = String(tCard.suit).toUpperCase();
                const tDiv = document.createElement("div");
                tDiv.className = "card-deal-animation-node";
                tDiv.style.width = "70px"; dDiv.style.height = "100px";
                tDiv.innerHTML = `<img src="${tVal}_of_${tSuit}.png" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.src='card-back.png'">`;
                tZone.appendChild(tDiv);
                playAudio('spin');
            }, 600);

            // 🕒 ৩. ফাইনাল রাউন্ড উইন-লস সেটেলমেন্ট নোটিশ ফায়ার
            setTimeout(() => {
                showFinalGameReward(serverData.status, serverData.winAmount, serverData.result);
            }, 1000);
        }

        async function handleDragonDeal() {
            if (isSpinning || isSpinning === true) return; // ডাবল-ডেবিট ব্লকার গেটওয়ে
            if (!selectedSide) {
                alert("🔒 বাজি প্লে করার আগে DRAGON, TIGER বা TIE সিলেক্ট করুন ওস্তাদ!");
                return;
            }

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🎰 ড্রাগন টাইগার কার্ড ডিলিং করা হচ্ছে...";
            playAudio('click');

            try {
                const response = await fetch(`${SERVER_URL}/api/dragon-deal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        prediction: selectedSide
                    })
                });

                const serverRes = await response.json();
                
                // 🎯 [অন্দর বাহার ও ব্যাকারাত স্টাইল মেগা ডাটা ইন্টারсеপ্টর বর্ম ওস্তাদ]
                if (serverRes.success || serverRes.success === true) {
                    let parsedLiveBalance = serverRes.balance || serverRes.data?.balance || balance;
                    balance = parseFloat(parsedLiveBalance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                    
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");
                    
                    let targetGamePayload = serverRes.gameData || serverRes;
                    animateCardDealing(targetGamePayload);
                } else {
                    alert(serverRes.message || "❌ Insufficient Balance! Please Recharge Wallet.");
                    stopDragonState();
                }
            } catch (err) {
                console.log("Dragon Tiger Core Engine Active Stream.");
                stopDragonState();
            }
        }

        function showFinalGameReward(status, winAmount, resultSide) {
                   const msgBox = document.getElementById("win-status-box");
        const textMsg = document.getElementById("win-text-msg");
        
        let displayResultBengali = resultSide === "DRAGON" ? "DRAGON (ড্রাগন) 🐉" : (resultSide === "TIGER" ? "TIGER (টাইগার) 🐅" : "TIE (ড্র) ⧗");

        if (status === "win") {
            playAudio('win');
            if (msgBox) msgBox.className = "win-status-container win-glow-bar";
            if (textMsg) textMsg.innerHTML = `🎉 গ্র্যান্ড উইন ওস্তাদ! <b>${displayResultBengali}</b> জিতেছে এবং ওয়ালেটে ৳${winAmount} ক্রেডিট হয়েছে ভাই ভাই!`;
        } else {
            playAudio('wheel');
            if (msgBox) msgBox.className = "win-status-container lose-glow-bar";
            if (textMsg) textMsg.innerHTML = `💥 ওহ হো! <b>${displayResultBengali}</b> জিতেছে। এই রাউন্ডে ভাগ্য সহায় হয়নি ওস্তাদ ভাই ভাই!`;
        }

        fetchLiveBalance();
        stopDragonState();

        if (isAuto) {
            autoInterval = setTimeout(() => {
                if (isAuto) handleDragonDeal();
            }, 3000);
        }
    }

    if (typeof io !== 'undefined') {
        const socket = io();
        socket.on("balanceUpdate", (data) => {
            if (data && data.username === urlUserId) {
                if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                fetchLiveBalance();
            }
        });
    }

    async function fetchLiveBalance() {
        try {
            const response = await fetch(`${SERVER_URL}/api/dragon-balance?userId=${urlUserId}&wallet=${urlWallet}`);
            const serverData = await response.json();
            if (serverData.success) {
                balance = parseFloat(serverData.balance);
                if (document.getElementById("user-balance")) {
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            }
        } catch (e) { console.error("Balance lag check"); }
    }

    window.onload = () => {
        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
        fetchLiveBalance();
    };

    function toggleMute() {
        isMuted = !isMuted;
        const muteEl = document.getElementById("mute-btn");
        if (muteEl) muteEl.innerText = isMuted ? "🔇" : "🔊";
        slotSounds.click.muted = isMuted;
        slotSounds.spin.muted = isMuted;
        slotSounds.win.muted = isMuted;
        slotSounds.wheel.muted = isMuted;
    }

    function toggleAuto() {
        isAuto = !isAuto;
        const autoEl = document.getElementById("auto-btn");
        if (autoEl) autoEl.classList.toggle('active', isAuto);
        if (isAuto && !isSpinning) handleDragonDeal();
        playAudio('click');
    }

    function stopDragonState() {
        isSpinning = false;
        if (document.getElementById("spin-btn")) {
            document.getElementById("spin-btn").disabled = false;
        }
        if (!isAuto && autoInterval) clearTimeout(autoInterval);
    }

    const slotSounds = {
        click: new Audio('click2.mp3'),
        spin: new Audio('spin2.mp3'),
        win: new Audio('win2.mp3'),
        wheel: new Audio('wheel1.mp3')
    };
    Object.values(slotSounds).forEach(s => s.load());

    function playAudio(type) {
        if (isMuted) return;
        try {
            slotSounds[type].currentTime = 0;
            slotSounds[type].play();
        } catch(e) {}
    }
</script>
</body>
</html>
