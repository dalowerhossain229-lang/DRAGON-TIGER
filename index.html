<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAGON TIGER CASINO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল -->
    <div class="header">
        <div class="brand">
            <div class="name">DRAGON TIGER</div>
            <div class="game">LIVE CARD SHOWDOWN</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🐉🐯 [ড্রাগন বনাম টাইগার ৩ডি তাসের লাইভ শোডাউন জোন] -->
    <div class="game-battle-zone">
        <!-- ড্রাগন সাইড (লাল লাক্সারি বর্ম) -->
        <div class="side-panel dragon-zone">
            <div class="side-title">DRAGON</div>
            <div class="card-slot">
                <div class="playing-card" id="dragon-card">🎴</div>
            </div>
        </div>

        <!-- টাইগার সাইড (নীল লাক্সারি বর্ম) -->
        <div class="side-panel tiger-zone">
            <div class="side-title">TIGER</div>
            <div class="card-slot">
                <div class="playing-card" id="tiger-card">🎴</div>
            </div>
        </div>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ বাজি ধরার ৩টি প্রধান বোর্ড ঘর ভাই ভাই -->
    <div class="betting-board">
        <button class="bet-board-btn drag-bet" id="board-dragon" onclick="selectBetSide('DRAGON')">
            <span class="board-label">DRAGON</span>
            <span class="board-odds">x2.00</span>
        </button>
        
        <button class="bet-board-btn tie-bet" id="board-tie" onclick="selectBetSide('TIE')">
            <span class="board-label">TIE</span>
            <span class="board-odds">x9.00</span>
        </button>
        
        <button class="bet-board-btn tig-bet" id="board-tiger" onclick="selectBetSide('TIGER')">
            <span class="board-label">TIGER</span>
            <span class="board-odds">x2.00</span>
        </button>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">যেকোনো এক পক্ষে বাজি ধরে DEAL বোতাম চাপুন ভাই!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০ প্লাস-মাইনাস ও DEAL বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleCardDeal()">DEAL</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let selectedOption = null; // DRAGON, TIGER, TIE
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/dragontiger-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance lag"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        };

        // 🎯 বাজি ধরার ঘর সিলেকশন মাস্টার মেথড ভাই ভাই
        function selectBetSide(side) {
            if (isSpinning) return;
            selectedOption = side;
            
            document.querySelectorAll(".bet-board-btn").forEach(b => b.classList.remove("active-side-bet"));
            if (side === 'DRAGON') document.getElementById("board-dragon").classList.add("active-side-bet");
            if (side === 'TIE') document.getElementById("board-tie").classList.add("active-side-bet");
            if (side === 'TIGER') document.getElementById("board-tiger").classList.add("active-side-bet");
            
            playAudio('click');
        }

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else currentBet -= 50;
            }
            if (action === 'plus' && currentBet < 2000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else currentBet += 50;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 2000) currentBet = 2000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleCardDeal();
            playAudio('click');
        }

                async function handleCardDeal() {
            if (isSpinning) return;
            if (!selectedOption) {
                alert("🚨 আগে বাজি ধরার যেকোনো ১টি ঘর (DRAGON, TIGER বা TIE) সিলেক্ট করুন ভাই!");
                isAuto = false;
                document.getElementById("auto-btn").classList.remove("active");
                return;
            }

            const dCard = document.getElementById("dragon-card");
            const tCard = document.getElementById("tiger-card");
            const msgBox = document.getElementById("win-status-box");
            
            msgBox.className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🃏 ডিলার তাস বন্টন করছে...";

            // ওল্ড কার্ড রিসেট এবং ৩ডি এনিমেশন বাউন্স ভাই ভাই
            dCard.className = "playing-card card-dealing";
            tCard.className = "playing-card card-dealing";
            dCard.innerText = "🎴";
            tCard.innerText = "🎴";
            dCard.style.color = "#fff";
            tCard.style.color = "#fff";

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;

            // 🚀 তাস টানার গড়গড় আওয়াজ spin2.mp3 ফায়ার লক ভাই!
            playAudio('spin');

            try {
                const response = await fetch(`${SERVER_URL}/api/dragontiger-deal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        prediction: selectedOption
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    // ২ সেকেন্ডের ৩ডি ফ্লিপিং মোশন শেষ হওয়ার পর তাস ওপেন হবে ভাই ভাই
                    setTimeout(() => {
                        // ১. ড্রাগন তাস ওপেন ভাই ভাই
                        dCard.className = "playing-card";
                        dCard.innerText = `${data.dragonCard.value}${data.dragonCard.suit}`;
                        if (data.dragonCard.suit === "♥️" || data.dragonCard.suit === "♦️") dCard.style.color = "#ea2027";

                        // ২. টাইগার তাস ওপেন ভাই ভাই
                        tCard.className = "playing-card";
                        tCard.innerText = `${data.tigerCard.value}${data.tigerCard.suit}`;
                        if (data.tigerCard.suit === "♥️" || data.tigerCard.suit === "♦️") tCard.style.color = "#ea2027";

                        showFinalResult(data.status, data.winAmount, data.winnerSide);
                    }, 2000);

                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopDealState();
                }
            } catch (err) {
                alert("⚠️ সেশন আউট! আবার DEAL বাটন চাপুন ভাই ভাই।");
                stopDealState();
            }
        }

        function showFinalResult(status, winAmount, winnerSide) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (status === "win") {
                // 🎵 বাজি জিতলে ডবল প্রফিট win2.mp3 সাউন্ড ফায়ার লক!
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! বিজয়ী পক্ষ: ${winnerSide} (৳${winAmount})`;
            } else if (status === "push") {
                // টাই হয়ে বাজি ধরা টাকা ফেরত এলে নরমাল উইন সাউন্ড ভাই
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                msgBox.style.background = "#e67e22";
                textMsg.innerText = `🤝 ড্র (TIE) হয়েছে! আপনার বাজি রিফান্ড করা হয়েছে (৳${winAmount})`;
            } else {
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ বিজয়ী পক্ষ: ${winnerSide}। এই রাউন্ডে ভাগ্য সহায় হয়নি ভাই!`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopDealState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleCardDeal();
                }, 2000);
            }
        }

        function stopDealState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৩টি তাজা প্রিমিয়াম সাউন্ড ট্র্যাক সিঙ্ক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
